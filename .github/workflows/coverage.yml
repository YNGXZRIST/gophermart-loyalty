name: coverage

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - iter1

permissions:
  contents: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    container: golang:1.26
    env:
      GOFLAGS: -buildvcs=false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate test coverage
        shell: bash
        run: |
          set -euo pipefail
          # cmd/statictest — отдельная утилита для statictest, тестов нет
          go list ./... | grep -v '/cmd/statictest$$' | xargs -r go test \
            -coverprofile=cover.out -covermode=atomic -coverpkg=./...
          go tool cover -func=cover.out

      - name: Check test coverage (thresholds)
        uses: vladopajic/go-test-coverage@v2
        with:
          config: .testcoverage.yml
          profile: cover.out

      # Один путь на всех ветках: .badges/coverage.svg — тогда в README можно относительную ссылку,
      # GitHub покажет файл той ветки, которую смотрите (не только default).
      - name: Publish coverage badge to repository
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/iter1')
        uses: vladopajic/go-test-coverage@v2
        with:
          config: .testcoverage.yml
          profile: cover.out
          git-token: ${{ secrets.GITHUB_TOKEN }}
          git-branch: ${{ github.ref_name }}
          git-file-name: .badges/coverage.svg
